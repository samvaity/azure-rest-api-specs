name: Namespace Approval
on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

permissions:
  pull-requests: write
  contents: read

jobs:
  detect-namespaces:
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    outputs:
      has_pending: ${{ steps.detect.outputs.has_pending }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install js-yaml
        run: npm install js-yaml

      - name: Detect namespace changes
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');
            const yaml = require('./node_modules/js-yaml');

            // Load approvers config
            let approversConfig;
            try {
              const approversYaml = fs.readFileSync('.github/namespace-approvers.yml', 'utf8');
              approversConfig = yaml.load(approversYaml);
            } catch (e) {
              core.setFailed('Failed to load .github/namespace-approvers.yml: ' + e.message);
              return;
            }

            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            const diffOutput = execSync(`git diff --name-only ${base}...${head}`).toString().trim();
            const changedFiles = diffOutput.split('\n').filter(f => f.match(/specification\/.*\/tspconfig\.yaml$/));

            if (changedFiles.length === 0) {
              core.info('No tspconfig.yaml changes detected, skipping');
              return;
            }

            core.info(`Found tspconfig.yaml changes: ${changedFiles.join(', ')}`);

            const namespacesFound = {};
            let isMgmt = false;
            let isDataPlane = false;

            for (const file of changedFiles) {
              if (!fs.existsSync(file)) continue;
              const tspDir = path.dirname(file);

              if (file.includes('.Management/') || file.includes('/resource-manager/')) {
                isMgmt = true;
              } else {
                isDataPlane = true;
              }

              // Run typespec-metadata emitter
              let metadata;
              try {
                core.info(`Running typespec-metadata emitter on ${tspDir}`);
                execSync(
                  `npx tsp compile "${tspDir}" --emit "@azure-tools/typespec-metadata" --output-dir "${tspDir}" --option "@azure-tools/typespec-metadata.format=json"`,
                  { stdio: 'pipe', timeout: 120000 }
                );

                const metadataPath = path.join(tspDir, '@azure-tools', 'typespec-metadata', 'typespec-metadata.json');
                if (!fs.existsSync(metadataPath)) throw new Error('metadata file not found');
                metadata = JSON.parse(fs.readFileSync(metadataPath, 'utf8'));

                if (metadata.typespec?.type === 'management') isMgmt = true;
                if (metadata.typespec?.type === 'data') isDataPlane = true;

              } catch (e) {
                core.warning(`typespec-metadata emitter failed: ${e.message}. Falling back to YAML parse.`);
                const content = fs.readFileSync(file, 'utf8');
                const parsed = yaml.load(content);
                if (!parsed?.options) continue;

                const emitterMap = {
                  '@azure-typespec/http-client-csharp': 'dotnet', '@azure-typespec/http-client-csharp-mgmt': 'dotnet',
                  '@azure-tools/typespec-csharp': 'dotnet', '@azure-tools/typespec-java': 'java',
                  '@azure-tools/typespec-python': 'python', '@azure-tools/typespec-ts': 'typescript',
                  '@azure-tools/typespec-go': 'go',
                };
                for (const [emitter, lang] of Object.entries(emitterMap)) {
                  const opts = parsed.options[emitter];
                  if (!opts) continue;
                  if (opts.namespace) namespacesFound[lang] = opts.namespace;
                  else if (opts['package-details']?.name) namespacesFound[lang] = opts['package-details'].name;
                  else if (opts.module) namespacesFound[lang] = opts.module;
                }
                continue;
              }

              // Extract from metadata
              const langMap = {
                'csharp': 'dotnet', 'http-client-csharp': 'dotnet', 'http-client-csharp-mgmt': 'dotnet',
                'java': 'java', 'python': 'python', 'typescript': 'typescript', 'go': 'go',
              };
              for (const [langKey, entries] of Object.entries(metadata.languages || {})) {
                const lang = langMap[langKey] || langKey;
                if (entries && entries.length > 0) {
                  const ns = entries[0].namespace || entries[0].packageName;
                  if (ns) namespacesFound[lang] = ns;
                }
              }

              const metadataDir = path.join(tspDir, '@azure-tools');
              try { fs.rmSync(metadataDir, { recursive: true }); } catch {}
            }

            // On synchronize: reset approvals for changed namespaces
            const prNumber = context.payload.pull_request.number;
            if (context.payload.action === 'synchronize') {
              const { data: currentPR } = await github.rest.pulls.get({ owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber });
              const existingLabels = currentPR.labels.map(l => l.name);
              for (const lang of Object.keys(namespacesFound)) {
                const approvedLabel = `${lang}-namespace-approved`;
                if (existingLabels.includes(approvedLabel)) {
                  core.info(`Namespace changed for ${lang}, resetting approval`);
                  try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: approvedLabel }); } catch {}
                }
              }
              if (existingLabels.includes('namespace-approved-all')) {
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: 'namespace-approved-all' }); } catch {}
              }
              if (existingLabels.includes('namespace-approved')) {
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: 'namespace-approved' }); } catch {}
              }
            }

            const languages = Object.keys(namespacesFound);
            if (languages.length === 0) { core.info('No namespace changes detected'); return; }

            // Apply labels
            const labelsToAdd = ['namespace-review-required'];
            if (isMgmt) labelsToAdd.push('mgmt-namespace');
            if (isDataPlane) labelsToAdd.push('data-namespace');
            for (const lang of languages) { labelsToAdd.push(`${lang}-namespace-pending`); }

            for (const label of labelsToAdd) {
              try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label }); }
              catch {
                const colors = { 'namespace-review-required': 'e11d48', 'mgmt-namespace': 'c084fc', 'data-namespace': '60a5fa' };
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color: colors[label] || (label.includes('pending') ? 'fbbf24' : '94a3b8') });
              }
            }
            await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, labels: labelsToAdd });

            // Build bot comment
            const getApprovers = (lang) => {
              if (isMgmt && approversConfig['management-plane']?.all) return approversConfig['management-plane'].all;
              return approversConfig['data-plane']?.[lang] || ['TBD'];
            };

            const planeType = isMgmt ? 'Management Plane' : 'Data Plane';
            let body = `## Namespace Review Required\n\n**Plane:** ${planeType}\n\n`;
            body += `| Language | Proposed Namespace | Status | Approvers |\n`;
            body += `|----------|-------------------|--------|----------|\n`;
            for (const [lang, ns] of Object.entries(namespacesFound)) {
              body += `| ${lang} | \`${ns}\` | ⏳ Pending | ${getApprovers(lang).join(', ')} |\n`;
            }
            body += `\n**How to approve:**\n`;
            body += `- Per language: apply \`<language>-namespace-approved\` label\n`;
            body += `- All at once: apply \`namespace-approved-all\` label (shortcut for mgmt plane)\n\n`;
            body += `Merge is blocked until all languages are approved.\n`;
            if (context.payload.action === 'synchronize') {
              body += `\n> ⚠️ **Namespace changed** — approvals for affected languages have been reset.\n`;
            }
            body += `\n_Approver list: [.github/namespace-approvers.yml](../blob/${context.payload.pull_request.base.ref}/.github/namespace-approvers.yml)_\n`;
            body += `_Namespaces extracted via [@azure-tools/typespec-metadata](https://www.npmjs.com/package/@azure-tools/typespec-metadata) emitter_\n`;
            body += `<!-- namespace-review-bot -->`;

            const comments = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber });
            const botComment = comments.data.find(c => c.user.type === 'Bot' && c.body.includes('<!-- namespace-review-bot -->'));
            if (botComment) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: botComment.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, body });
            }
            core.setOutput('has_pending', 'true');

  validate-approval:
    if: github.event.action == 'labeled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout for config
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          sparse-checkout: .github/namespace-approvers.yml
          sparse-checkout-cone-mode: false

      - name: Install js-yaml
        run: npm install js-yaml

      - name: Validate namespace approval label
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('./node_modules/js-yaml');

            let approversConfig;
            try {
              const approversYaml = fs.readFileSync('.github/namespace-approvers.yml', 'utf8');
              approversConfig = yaml.load(approversYaml);
            } catch (e) {
              core.setFailed('Failed to load .github/namespace-approvers.yml: ' + e.message);
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const labels = context.payload.pull_request.labels.map(l => l.name);

            if (!labels.includes('namespace-review-required')) { core.info('No namespace review, skipping'); return; }

            const addedLabel = context.payload.label.name;
            const isMgmt = labels.includes('mgmt-namespace');
            const actor = context.payload.sender.login;

            // Determine if this is a per-language approval or the "all" shortcut
            let langsToApprove = [];

            if (addedLabel === 'namespace-approved-all') {
              // Shortcut: approve all pending languages at once
              const mgmtApprovers = approversConfig['management-plane']?.all || [];
              // For "approve all", allow mgmt approvers OR any architect who appears in data-plane config
              const allApprovers = [...new Set([...mgmtApprovers, ...Object.values(approversConfig['data-plane'] || {}).flat()])];

              if (!allApprovers.includes(actor)) {
                await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: addedLabel });
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
                  body: `⚠️ @${actor} is not authorized to use \`namespace-approved-all\`. This shortcut is available to authorized namespace approvers.\n\nLabel removed.` });
                return;
              }

              // Find all pending languages and approve them
              langsToApprove = labels.filter(l => l.endsWith('-namespace-pending')).map(l => l.replace('-namespace-pending', ''));

            } else {
              const match = addedLabel.match(/^(\w+)-namespace-approved$/);
              if (!match) { core.info(`${addedLabel} is not a namespace approval label`); return; }

              const lang = match[1];
              let authorizedList;
              if (isMgmt && approversConfig['management-plane']?.all) {
                authorizedList = approversConfig['management-plane'].all;
              } else {
                authorizedList = approversConfig['data-plane']?.[lang] || [];
              }

              if (!authorizedList.includes(actor)) {
                await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: addedLabel });
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
                  body: `⚠️ @${actor} is not authorized to approve **${lang}** namespace. Authorized approvers: ${authorizedList.join(', ')}.\n\nLabel \`${addedLabel}\` has been removed.` });
                return;
              }

              langsToApprove = [lang];
            }

            core.info(`Approving languages: ${langsToApprove.join(', ')} by ${actor}`);

            // Apply per-language approved labels and remove pending labels
            for (const lang of langsToApprove) {
              try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: `${lang}-namespace-pending` }); } catch {}

              // Add per-language approved label (if using shortcut)
              if (addedLabel === 'namespace-approved-all') {
                const approvedLabel = `${lang}-namespace-approved`;
                try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: approvedLabel }); }
                catch { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: approvedLabel, color: '22c55e' }); }
                await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, labels: [approvedLabel] });
              }
            }

            // Update bot comment
            const { data: currentPR } = await github.rest.pulls.get({ owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber });
            const currentLabels = currentPR.labels.map(l => l.name);
            const pendingLabels = currentLabels.filter(l => l.endsWith('-namespace-pending'));

            const comments = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber });
            const botComment = comments.data.find(c => c.user.type === 'Bot' && c.body.includes('<!-- namespace-review-bot -->'));

            if (botComment) {
              let body = botComment.body;
              for (const lang of langsToApprove) {
                const rowRegex = new RegExp(`(\\| ${lang} \\|[^|]+\\|) ⏳ Pending (\\|)`, 'i');
                body = body.replace(rowRegex, `$1 ✅ Approved by @${actor} $2`);
              }
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: botComment.id, body });
            }

            if (pendingLabels.length === 0) {
              core.info('All namespaces approved!');
              try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: 'namespace-review-required' }); } catch {}
              try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'namespace-approved' }); }
              catch { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'namespace-approved', color: '22c55e' }); }
              await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, labels: ['namespace-approved'] });
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
                body: '## ✅ Namespace Approved\n\nAll required namespace approvals received. This PR is clear to merge from a namespace perspective.' });
            }

  status-check:
    runs-on: ubuntu-latest
    needs: [detect-namespaces, validate-approval]
    if: always()
    steps:
      - name: Verify namespace approval status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({ owner: context.repo.owner, repo: context.repo.repo, pull_number: context.payload.pull_request.number });
            const labels = pr.labels.map(l => l.name);

            if (!labels.includes('namespace-review-required')) {
              core.info('No namespace review required, passing');
              return;
            }

            const pendingLabels = labels.filter(l => l.endsWith('-namespace-pending'));
            if (pendingLabels.length > 0) {
              core.setFailed(`Namespace approval pending for: ${pendingLabels.map(l => l.replace('-namespace-pending', '')).join(', ')}`);
            } else if (labels.includes('namespace-approved')) {
              core.info('All namespaces approved - merge allowed');
            }
