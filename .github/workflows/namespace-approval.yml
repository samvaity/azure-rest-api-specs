name: Namespace Approval
on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
    paths:
      - 'specification/**/tspconfig.yaml'

permissions:
  pull-requests: write
  contents: read

jobs:
  detect-namespaces:
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect namespace changes in tspconfig.yaml
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            const diffOutput = execSync(`git diff --name-only ${base}...${head}`).toString().trim();
            const changedFiles = diffOutput.split('\n').filter(f => f.match(/specification\/.*\/tspconfig\.yaml$/));

            if (changedFiles.length === 0) {
              core.info('No tspconfig.yaml changes detected');
              return;
            }

            core.info(`Found tspconfig.yaml changes: ${changedFiles.join(', ')}`);

            const emitterMap = {
              '@azure-typespec/http-client-csharp': 'dotnet',
              '@azure-typespec/http-client-csharp-mgmt': 'dotnet',
              '@azure-tools/typespec-csharp': 'dotnet',
              '@azure-tools/typespec-java': 'java',
              '@azure-tools/typespec-python': 'python',
              '@azure-tools/typespec-ts': 'typescript',
              '@azure-tools/typespec-go': 'go',
            };

            const namespacesFound = {};
            let isMgmt = false;
            let isDataPlane = false;

            for (const file of changedFiles) {
              if (!fs.existsSync(file)) continue;
              const content = fs.readFileSync(file, 'utf8');

              if (file.includes('.Management/') || content.includes('resource-manager')) {
                isMgmt = true;
              } else {
                isDataPlane = true;
              }

              let isNew = false;
              try {
                execSync(`git show ${base}:${file}`, { stdio: 'pipe' });
              } catch {
                isNew = true;
              }

              for (const [emitter, lang] of Object.entries(emitterMap)) {
                const escaped = emitter.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const nsRegex = new RegExp(`"?${escaped}"?:[\\s\\S]*?namespace:\\s*["']?([^"'\\n]+)["']?`, 'm');
                const pkgRegex = new RegExp(`"?${escaped}"?:[\\s\\S]*?(?:name|module):\\s*["']?([^"'\\n]+)["']?`, 'm');

                const nsMatch = content.match(nsRegex);
                const pkgMatch = content.match(pkgRegex);
                const currentNs = nsMatch ? nsMatch[1].trim() : (pkgMatch ? pkgMatch[1].trim() : null);
                if (!currentNs) continue;

                if (isNew) {
                  namespacesFound[lang] = currentNs;
                } else {
                  try {
                    const oldContent = execSync(`git show ${base}:${file}`, { encoding: 'utf8' });
                    const oldNsMatch = oldContent.match(nsRegex);
                    const oldPkgMatch = oldContent.match(pkgRegex);
                    const oldNs = oldNsMatch ? oldNsMatch[1].trim() : (oldPkgMatch ? oldPkgMatch[1].trim() : null);
                    if (oldNs !== currentNs) namespacesFound[lang] = currentNs;
                  } catch {
                    namespacesFound[lang] = currentNs;
                  }
                }
              }
            }

            const languages = Object.keys(namespacesFound);
            if (languages.length === 0) {
              core.info('No namespace changes detected');
              return;
            }

            // Apply labels
            const labelsToAdd = ['namespace-review-required'];
            if (isMgmt) labelsToAdd.push('mgmt-namespace');
            if (isDataPlane) labelsToAdd.push('data-namespace');
            for (const lang of languages) {
              labelsToAdd.push(`${lang}-namespace-pending`);
            }

            for (const label of labelsToAdd) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
              } catch {
                const colors = { 'namespace-review-required': 'e11d48', 'mgmt-namespace': 'c084fc', 'data-namespace': '60a5fa' };
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name: label,
                  color: colors[label] || (label.includes('pending') ? 'fbbf24' : '94a3b8'),
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number, labels: labelsToAdd,
            });

            // Approver config (no @ mentions in POC)
            const approvers = {
              'dotnet': ['jsquire', 'm-nash'], 'java': ['JonathanGiles', 'alzimmermsft'],
              'python': ['xirzec', 'kashifkhan'], 'typescript': ['xirzec', 'maorleger'],
              'go': ['jhendrixMSFT'],
            };
            const mgmtApprovers = ['ArthurMa1978', 'm-nash'];

            const planeType = isMgmt ? 'Management Plane' : 'Data Plane';
            let body = `## Namespace Review Required\n\n**Plane:** ${planeType}\n\n`;
            body += `### Detected Namespaces\n\n| Language | Proposed Namespace |\n|----------|-------------------|\n`;
            for (const [lang, ns] of Object.entries(namespacesFound)) {
              body += `| ${lang} | \`${ns}\` |\n`;
            }
            body += `\n### Approval Status\n\n`;
            for (const lang of languages) {
              const la = isMgmt ? mgmtApprovers : (approvers[lang] || ['TBD']);
              body += `- [ ] **${lang}**: Waiting for approval from ${la.join(' or ')}\n`;
            }
            body += `\n### How to Approve\n\n`;
            body += `Authorized approvers: apply the \`<language>-namespace-approved\` label to this PR.\n`;
            body += `The merge check will pass once all languages are approved.\n`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const botComment = comments.data.find(c => c.user.type === 'Bot' && c.body.includes('## Namespace Review Required'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: botComment.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body,
              });
            }

  validate-approval:
    if: github.event_name == 'pull_request' && github.event.action == 'labeled'
    runs-on: ubuntu-latest
    steps:
      - name: Validate namespace approval label
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const labels = context.payload.pull_request.labels.map(l => l.name);

            if (!labels.includes('namespace-review-required')) return;

            const addedLabel = context.payload.label.name;
            const match = addedLabel.match(/^(\w+)-namespace-approved$/);
            if (!match) return;

            const lang = match[1];
            const actor = context.payload.sender.login;
            const isMgmt = labels.includes('mgmt-namespace');

            const approvers = {
              'dotnet': ['jsquire', 'm-nash'], 'java': ['JonathanGiles', 'alzimmermsft'],
              'python': ['xirzec', 'kashifkhan'], 'typescript': ['xirzec', 'maorleger'],
              'go': ['jhendrixMSFT'], 'cpp': ['LarryOsterman'], 'rust': ['heaths', 'LarryOsterman'],
            };
            const mgmtApprovers = ['ArthurMa1978', 'm-nash'];
            const authorizedList = isMgmt ? mgmtApprovers : (approvers[lang] || []);

            core.info(`Label: ${addedLabel}, Actor: ${actor}, Authorized: ${authorizedList.join(', ')}`);

            if (!authorizedList.includes(actor)) {
              core.info(`Unauthorized: removing label`);
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: addedLabel,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
                body: `${actor} is not authorized to approve ${lang} namespace. Authorized approvers: ${authorizedList.join(', ')}. Label \`${addedLabel}\` has been removed.`,
              });
              return;
            }

            // Valid approval - remove pending label
            core.info(`Authorized: removing ${lang}-namespace-pending`);
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: `${lang}-namespace-pending`,
              });
            } catch {}

            // Check if all approved
            const { data: currentPR } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber,
            });
            const pendingLabels = currentPR.labels.map(l => l.name).filter(l => l.endsWith('-namespace-pending'));

            if (pendingLabels.length === 0) {
              core.info('All namespaces approved!');
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: 'namespace-review-required',
                });
              } catch {}

              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'namespace-approved' });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name: 'namespace-approved', color: '22c55e',
                });
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, labels: ['namespace-approved'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
                body: '## Namespace Approved\n\nAll required namespace approvals received. This PR is clear to merge from a namespace perspective.',
              });
            } else {
              core.info(`Still pending: ${pendingLabels.join(', ')}`);
            }

  status-check:
    runs-on: ubuntu-latest
    needs: [detect-namespaces]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Verify namespace approval status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const labels = pr.labels.map(l => l.name);

            if (!labels.includes('namespace-review-required')) {
              core.info('No namespace review required, passing');
              return;
            }

            const pendingLabels = labels.filter(l => l.endsWith('-namespace-pending'));

            if (pendingLabels.length > 0) {
              core.setFailed(
                `Namespace approval pending for: ${pendingLabels.map(l => l.replace('-namespace-pending', '')).join(', ')}. ` +
                `Authorized approvers must add per-language namespace-approved labels.`
              );
            } else if (labels.includes('namespace-approved')) {
              core.info('All namespaces approved');
            }