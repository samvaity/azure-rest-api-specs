# ContosoDemo namespace configuration for data-plane
parameters:
  "service-dir":
    default: "sdk/contosodemo"
output-dir: "{project-root}/../"
emit:
  - "@azure-tools/typespec-autorest"
linter:
  extends:
    - "@azure-tools/typespec-azure-rulesets/data-plane"
options:
  "@azure-tools/typespec-autorest":
    azure-resource-provider-folder: "data-plane"
    emitter-output-dir: "{project-root}/.."
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/ContosoDemo.json"
  "@azure-tools/typespec-csharp":
    emitter-output-dir: "{output-dir}/{service-dir}/{namespace}"
    namespace: Azure.ContosoDemo
    flavor: azure
  "@azure-tools/typespec-java":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-contoso-demo-1"
    namespace: "com.azure.contosodemo"
    flavor: azure
  "@azure-tools/typespec-python":
    emitter-output-dir: "{output-dir}/{service-dir}/azure-contosodemo"
    namespace: "azure.contosodemo"
    flavor: azure
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{output-dir}/{service-dir}/contosodemo-rest"
    package-details:
      name: "@azure-rest/contoso-demo"
      description: "Contoso Demo Rest Client"
    flavor: azure
  "@azure-tools/typespec-go":
    service-dir: "sdk/contosodemo"
    emitter-output-dir: "{output-dir}/{service-dir}/azcontosodemo"
    module: "github.com/Azure/azure-sdk-for-go/{service-dir}/azcontosodemo"
    flavor: azure
